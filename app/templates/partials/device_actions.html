<td class="actions">
    <div class="actions-inner">
    {% if mode == 'view' %}
        <form id="edit-device-button-{{ device_id }}" hx-post="{{ url_for('edit_device_button', device_id=device_id) }}" hx-target="#device-{{ device_id }}" hx-swap="outerHTML">
            <button type="submit" class="btn">Edit</button>
        </form>
    {% elif mode == 'edit' %}
        <form id="update-device-{{ device_id }}" method="post" action="{{ url_for('update_device', device_id=device_id) }}">
            <button type="submit" class="btn btn--success" disabled aria-label="Save changes">
                <img class="button-icon" src="{{ url_for('static', path='icons/check-solid-full.svg') }}" alt="" aria-hidden="true">
            </button>
        </form>
        <form id="cancel-device-{{ device_id }}" hx-post="{{ url_for('cancel_device_button', device_id=device_id) }}" hx-target="#device-{{ device_id }}" hx-swap="outerHTML">
            <button type="submit" class="btn btn--danger" aria-label="Cancel edit">
                <img class="button-icon" src="{{ url_for('static', path='icons/x-solid-full.svg') }}" alt="" aria-hidden="true">
            </button>
        </form>
        <form class="inline-form" method="post" action="{{ url_for('delete_device', device_id=device_id) }}" onsubmit="return confirm('Are you sure you want to delete {{ device.name }}?');">
            <button type="submit" class="btn btn--danger" aria-label="Delete device">
                <img class="button-icon" src="{{ url_for('static', path='icons/trash-solid-full.svg') }}" alt="" aria-hidden="true">
            </button>
        </form>
    {% else %}
        <form id="new-device-form" class="create-form" hx-post="{{ url_for('create_device') }}" hx-target="body" hx-swap="outerHTML">
            <button type="submit" class="btn btn--success">Add</button>
        </form>
        <form id="cancel-new-device" hx-on="submit: event.preventDefault(); document.querySelector('#add-device-button').disabled = false; this.closest('tr').remove();">
            <button type="submit" class="btn btn--danger" aria-label="Cancel edit">
                <img class="button-icon" src="{{ url_for('static', path='icons/x-solid-full.svg') }}" alt="" aria-hidden="true">
            </button>
        </form>
    {% endif %}
    </div>
</td>
